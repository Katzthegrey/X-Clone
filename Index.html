<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Formerly Twitter</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-fluid px-0">
        <div class="row g-0">
            <!-- Left Aside - Navigation (removed Bootstrap column classes) -->
            <aside class="left-aside">
                <div class="d-flex flex-column justify-content-between h-100 py-2 nav-container">
                    <div>
                        <!-- Logo -->
                        <div class="nav-item mb-2">
                            <div class="nav-icon">
                                <img src="Repos/Logo.svg" alt="logo" class="">
                            </div>
                        </div>
                        
                        <!-- Navigation Items with X-style outlined icons -->
                        <div class="nav-item active mt-2">
                            <div class="nav-icon"><i class="fas fa-home"></i></div>
                            <span class="nav-text">Home</span>
                        </div>
                        
                        <div class="nav-item">
                            <div class="nav-icon"><i class="fas fa-search"></i></div>
                            <span class="nav-text">Explore</span>
                        </div>
                        
                        <div class="nav-item">
                            <div class="nav-icon"><i class="far fa-bell"></i></div>
                            <span class="nav-text">Notifications</span>
                        </div>
                        
                        <div class="nav-item">
                            <div class="nav-icon"><i class="far fa-envelope"></i></div>
                            <span class="nav-text">Messages</span>
                        </div>

                        <div class="nav-item">
                            <div class="nav-icon">
                               <img src="Repos/Grok.svg" alt="grok" class="">
                            </div>
                            <span class="nav-text">Grok</span>
                        </div>
                        
                        <div class="nav-item">
                            <div class="nav-icon"><i class="far fa-bookmark"></i></div>
                            <span class="nav-text">Bookmarks</span>
                            <span class="badge-off">50% off</span>
                        </div>

                        <div class="nav-item">
                            <div class="nav-icon">
                                <img src="Repos/Logo.svg" alt="premium" class="">
                            </div>
                            <span class="nav-text">Premium</span>
                        </div>
                        
                        <div class="nav-item">
                            <div class="nav-icon"><i class="far fa-user"></i></div>
                            <span class="nav-text">Profile</span>
                        </div>
                        
                        <div class="nav-item">
                            <div class="nav-icon"><i class="fas fa-ellipsis-h"></i></div>
                            <span class="nav-text">More</span>
                        </div>
                        
                        <!-- Post Button -->
                        <div class="mt-4">
                            <button class="tweet-btn">
                                <i class="fas fa-feather-alt me-2 d-md-none"></i>
                                <span class="d-none d-md-inline">Post</span>
                            </button>
                        </div>
                    </div>
                    
                    <!-- User Profile -->
                    <div class="nav-item mb-3 w-100 user-profile">
                        <div class="nav-icon"><i class="far fa-user-circle fa-2x"></i></div>
                        <div class="d-none d-md-block flex-grow-1">
                            <div class="fw-bold user-name">Katz</div>
                            <div class="text-secondary username">@Kxtz23</div>
                        </div>
                        <div class="d-none d-md-block">
                            <i class="fas fa-ellipsis-h more-icon"></i>
                        </div>
                    </div>
                </div>
            </aside>
            
            <!-- Main Section - adjust column classes to take remaining space -->
            <main class="col-md-6 col-lg-7 main-content">
                <div class="text-center py-5 text-secondary placeholder-content">
                    <i class="fas fa-code fa-3x mb-3"></i>
                    <h4>Main Content Area</h4>
                    <p>Navbar + Feed will go here</p>
                </div>
            </main>

            <!-- Right Aside -->
            <aside class="col-lg-3 d-none d-lg-block right-aside">
                <div class="text-center py-5 text-secondary placeholder-content">
                    <i class="fas fa-search fa-3x mb-3"></i>
                    <h4>Right Aside</h4>
                    <p>Search + Trending will go here</p>
                </div>
            </aside>
        </div>
    </div>
</body>
</html>
